<body>
  <div id="root"></div>
  <!--
      Early Crypto Reference Storage (Proxy Detection Layer)
      This MUST be the first <script> on the page. It saves pristine references
      to all critical Web Crypto functions before any other code (React, npm
      packages, browser extensions) can tamper with them. verifyCryptoIntegrity()
      later uses strict equality (===) to detect Proxy wrappers.
    -->
  <script>
    (function () {
      'use strict';
      if (typeof globalThis.crypto !== 'undefined' && globalThis.crypto.subtle) {
        globalThis.__CRYPTO_REFS__ = Object.freeze({
          getRandomValues: globalThis.crypto.getRandomValues,
          encrypt: globalThis.crypto.subtle.encrypt,
          decrypt: globalThis.crypto.subtle.decrypt,
          generateKey: globalThis.crypto.subtle.generateKey,
          importKey: globalThis.crypto.subtle.importKey,
          _ts: Date.now()
        });
      }
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
